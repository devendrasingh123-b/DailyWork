// L2 - Building a Callback-Based Async Workflow
// Problem Statement:
// Develop a complex workflow using asynchronous tasks to simulate user registration and welcome notification. Write functions registerUser, sendVerification, loginUser, and displayWelcomeMessage. Each task should simulate a 1-second delay, executed in sequence using callbacks. Pass error messages between functions in case of failure, and log the failure reason.

// Steps:

// Write registerUser to simulate a registration delay; on success, proceed to sendVerification.
// sendVerification should simulate sending a verification email; on success, proceed to loginUser.
// loginUser should simulate logging the user in; on success, call displayWelcomeMessage.
// If any step fails, log the error and stop the workflow.
// Submission Guidelines:

function registerUser(callback){

    setTimeout(()=>{

        let success = true

        if(!success){
            callback("Registration failed")
            return
        }

        console.log("registration successful")

        callback(null)

    },1000)

}

function sendVerification(callback){

    setTimeout(()=>{

        let success = true

        if(!success){
            callback("Verification failed")
            return
        }

        console.log("verification sent")

        callback(null)

    },1000)

}

function loginUser(callback){

    setTimeout(()=>{

        let success = true

        if(!success){
            callback("Login failed")
            return
        }

        console.log("login successful")

        callback(null)

    },1000)

}

function displayWelcomeMessage(){
    console.log("Welcome user!")
}



registerUser(()=>{
    sendVerification(()=>{
        loginUser(()=>{
            displayWelcomeMessage()
        })
    })
})

function createCar(year,make,model){

    return {
        model:model,
        year :year,
       make:make,


        describeCar :function (){

            console.log(`this car is a ${year} ,${model} ,${make} `)

        }
    }

}

function createInventoryItem(item,catagery,price){


    return {
        item:item,
        catagery:catagery,
        price:price,


        describeItem:function (){

            console.log(`Itme: ${item} ${catagery} ${price}`)
        }
}
}


function addItemDiscount(obj,discount){

    let price=obj.price
    let dis=price/discount

    return {

        applyDiscount:function (){
            console.log(`Discounted Price for ${obj.item} : ${price-dis}`)
        }
    }

}

item.describeItem();
// Output: Item: Laptop, Category: Electronics, Price: 1500

// Example:
// const library = createLibrary();

// const book1 = Book("To Kill a Mockingbird", "Harper Lee");
// const book2 = Book("1984", "George Orwell");

// library.addBook(book1);
// library.addBook(book2);

// library.listBooks();
// // Output:
// // Title: To Kill a Mockingbird, Author: Harper Lee
// // Title: 1984, Author: George Orwell

// library.removeBook("1984");
// library.listBooks();
// // Output:
// // Title: To Kill a Mockingbird, Author: Harper Lee

function Book(title, author) {

    return {

        title: title,
        author: author,

        // book ki details print karega
        details() {
            console.log(`Title: ${this.title}, Author: ${this.author}`)
        }

    }

}


function createLibrary() {

    // internal array jisme books store honge
    let books = []

    return {

        // book add karne ka method
        addBook(book) {
            books.push(book)
        },

        // title se book remove karega
        removeBook(title) {

            books = books.filter((book) => {
                return book.title !== title
            })

        },

        // saari books list karega
        listBooks() {

            books.forEach((book) => {
                book.details()
            })

        }

    }

}


const library = createLibrary()

const book1 = Book("To Kill a Mockingbird", "Harper Lee")
const book2 = Book("1984", "George Orwell")

library.addBook(book1)
library.addBook(book2)

library.listBooks()

library.removeBook("1984")

library.listBooks()
