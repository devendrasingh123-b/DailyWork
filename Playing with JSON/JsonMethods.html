}

v()



// Problem Statement:
// Create a constructor function Person that initializes name and age. Implement a method displayInfo() using this inside the constructor, and then use the bind() method to create a new function that retains the context of the original Person instance. Finally, log the details using this new function

function Person(name,age){

    this.name = name
    this.age = age

    this.displayInfo = function(){
        console.log(this.name,this.age)
    }

}

let p1 = new Person("Ravi",25)

let boundFunc = p1.displayInfo.bind(p1)

boundFunc()

// L2: Sort an Array of Names Alphabetically using localeCompare()
// Write a function sortNames(namesArray) that sorts an array of names alphabetically using the sort() method and localeCompare().

// Example Input:

// ["Charlie", "Alice", "Bob"]

// Example Output:

// ["Alice", "Bob", "Charlie"]


function sortNames(arr){

    arr.sort((a,b)=>{
        return a.localeCompare(b)
    })

    return arr
}


let val02=["Charlie", "Alice", "Bob"]

console.log(sortNames(val02))
